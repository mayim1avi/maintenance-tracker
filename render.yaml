# Render Blueprint — one web service that builds the client + server and serves
# both from a single Node process, with a persistent disk for the SQLite DB and
# uploaded photos.
#
# Deploy: push this repo to GitHub, then in Render: New → Blueprint → pick the repo.
# Render reads this file and provisions everything. Set ADMIN_PASSWORD when prompted.
#
# NOTE: a persistent disk requires a paid instance type (Starter, ~$7/mo).
# On the free plan the disk is unavailable and the filesystem is wiped on every
# restart/redeploy, so the database and photos would NOT survive.

services:
  - type: web
    name: maintenance-tracker
    runtime: node
    plan: starter
    # Install dev deps too (tsc/vite are needed to build), then build both packages.
    buildCommand: >-
      npm install --include=dev &&
      npm install --prefix server --include=dev &&
      npm install --prefix client --include=dev &&
      npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      # SQLite file + uploads live on the mounted disk so they persist.
      - key: DATA_DIR
        value: /var/data
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_NAME
        value: מנהל מערכת
      # Set this in the Render dashboard (kept out of the repo).
      - key: ADMIN_PASSWORD
        sync: false
